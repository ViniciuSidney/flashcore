<!doctype html>
<html lang="pt-BR" data-theme="system">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#0f172a" />
		<meta name="description" content="FlashCore: aplicação local-first para organizar e revisar conteúdos com flashcards." />
		<title>FlashCore</title>

		<!--
			Em ambiente local, diferentes projetos abertos no mesmo endereço do Live Server
			podem compartilhar um Service Worker antigo. Este saneamento é executado apenas
			em localhost e evita que arquivos de outra aplicação sejam carregados por cache.
		-->
		<script>
			(() => {
				const localHosts = new Set(['localhost', '127.0.0.1', '::1']);
				if (!localHosts.has(window.location.hostname)) return;

				const reloadKey = 'flashcore.local-runtime-cleanup.v1';

				async function clearLocalRuntimeCache() {
					const wasControlled = Boolean(navigator.serviceWorker?.controller);

					if ('serviceWorker' in navigator) {
						const registrations = await navigator.serviceWorker.getRegistrations();
						await Promise.all(
							registrations
								.filter((registration) => new URL(registration.scope).origin === window.location.origin)
								.map((registration) => registration.unregister())
						);
					}

					if ('caches' in window) {
						const cacheNames = await window.caches.keys();
						await Promise.all(cacheNames.map((cacheName) => window.caches.delete(cacheName)));
					}

					if (wasControlled && sessionStorage.getItem(reloadKey) !== 'done') {
						sessionStorage.setItem(reloadKey, 'done');
						window.location.reload();
						return;
					}

					sessionStorage.removeItem(reloadKey);
				}

				clearLocalRuntimeCache().catch((error) => {
					console.warn('[FlashCore] Não foi possível limpar o cache local antigo.', error);
				});
			})();
		</script>
		<link rel="icon" href="public/favicon.svg" type="image/svg+xml" />
		<link rel="manifest" href="public/manifest.json" />
		<link rel="stylesheet" href="src/styles/main.css?v=0.1.6" />
	</head>
	<body>
		<a class="skip-link" href="#appView">Ir para o conteúdo</a>

			<aside class="app-sidebar" aria-label="Navegação principal">
				<a class="brand" href="#home" aria-label="FlashCore - Início">
					<span class="brand__mark" aria-hidden="true">⚡</span>
					<span class="brand__copy">
						<strong>FlashCore</strong>
						<small>O núcleo da sua revisão</small>
					</span>
				</a>

				<nav class="primary-nav" data-navigation>
					<a class="nav-link" href="#home" data-route-link="home">
						<span aria-hidden="true">⌂</span><span>Início</span>
					</a>
					<a class="nav-link" href="#decks" data-route-link="decks">
						<span aria-hidden="true">▦</span><span>Baralhos</span>
					</a>
					<a class="nav-link" href="#review" data-route-link="review">
						<span aria-hidden="true">◈</span><span>Revisar</span>
					</a>
					<a class="nav-link" href="#import" data-route-link="import">
						<span aria-hidden="true">⇩</span><span>Importar</span>
					</a>
					<a class="nav-link" href="#settings" data-route-link="settings">
						<span aria-hidden="true">⚙</span><span>Opções</span>
					</a>
				</nav>

				<section class="sidebar-summary" aria-labelledby="sidebarSummaryTitle">
					<div>
						<span class="eyebrow" id="sidebarSummaryTitle">Hoje</span>
						<strong id="sidebarDueCount">0</strong>
						<small>cards aguardando revisão</small>
					</div>
					<button class="button button--primary button--block" type="button" data-action="start-scheduled-review">
						Revisar agora
					</button>
				</section>

				<footer class="sidebar-footer">
					<span>v0.1</span>
					<span>Dados locais</span>
				</footer>
			</aside>

			<div class="app-stage">
				<header class="app-header">
					<div class="app-header__title">
						<span class="eyebrow" id="pageEyebrow">FlashCore</span>
						<h1 id="pageTitle">Início</h1>
					</div>

					<div class="app-header__actions">
						<button class="icon-button" type="button" data-action="quick-add-card" aria-label="Criar flashcard" title="Criar flashcard">＋</button>
						<button class="icon-button" type="button" data-action="toggle-theme" aria-label="Alternar tema" title="Alternar tema">
							<span id="themeToggleIcon" aria-hidden="true">◐</span>
						</button>
					</div>
				</header>

				<main class="app-view" id="appView" tabindex="-1" aria-live="polite"></main>
			</div>
		</div>

		<nav class="bottom-nav" aria-label="Navegação principal móvel" data-navigation>
			<a href="#home" data-route-link="home"><span aria-hidden="true">⌂</span><small>Início</small></a>
			<a href="#decks" data-route-link="decks"><span aria-hidden="true">▦</span><small>Baralhos</small></a>
			<a href="#review" data-route-link="review"><span aria-hidden="true">◈</span><small>Revisar</small></a>
			<a href="#import" data-route-link="import"><span aria-hidden="true">⇩</span><small>Importar</small></a>
			<a href="#settings" data-route-link="settings"><span aria-hidden="true">⚙</span><small>Opções</small></a>
		</nav>

		<dialog class="app-dialog" id="appDialog" aria-labelledby="dialogTitle">
			<form method="dialog" class="dialog-card" id="dialogForm">
				<header class="dialog-header">
					<div class="dialog-heading">
						<span class="dialog-icon" id="dialogIcon" aria-hidden="true">⚡</span>
						<div>
							<span class="eyebrow" id="dialogEyebrow">FlashCore</span>
							<h2 id="dialogTitle">Título</h2>
						</div>
					</div>
					<button class="icon-button icon-button--quiet" type="button" id="dialogCloseButton" aria-label="Fechar modal">×</button>
				</header>
				<div class="dialog-body" id="dialogBody"></div>
				<footer class="dialog-actions" id="dialogActions"></footer>
			</form>
		</dialog>

		<div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

		<script type="module" src="src/scripts/main.js?v=0.1.2"></script>
	</body>
</html>
